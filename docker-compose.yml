services:
  postgres:
    image: postgres:17-alpine
    container_name: coinpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coinpulse
    ports:
      - "5432:5432"
    volumes:
      - coinpulse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coinpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: coinpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - coinpulse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  coinpulse-postgres-data:
  coinpulse-redis-data:
